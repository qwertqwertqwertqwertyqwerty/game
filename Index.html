<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

header{
  text-align:center;
  padding:40px;
}

h1{
  font-size:3rem;
  margin:0;
}

#search{
  width:300px;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  padding:40px;
}

.card{
  background:#1e293b;
  border-radius:15px;
  padding:20px;
  text-align:center;
  transition:0.25s;
}

.card:hover{
  transform:translateY(-5px);
  background:#334155;
}

.card a{
  text-decoration:none;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>🎮 Game Hub</h1>
<p>10,000 Games in One Place</p>
<input id="search" placeholder="Search games..." onkeyup="searchGames()">
</header>

<div class="grid" id="games"></div>

<script>
const games = [];
for(let i=1;i<=10000;i++){
  games.push({
    name:"Game "+i,
    link:"https://example.com/game"+i
  });
}

const container=document.getElementById("games");

function render(list){
  container.innerHTML="";
  list.forEach(g=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<a href="${g.link}" target="_blank">${g.name}</a>`;
    container.appendChild(div);
  });
}

function searchGames(){
  const term=document.getElementById("search").value.toLowerCase();
  render(games.filter(g=>g.name.toLowerCase().includes(term)));
}

render(games);
</script>

</body>
</html>
